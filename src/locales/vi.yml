        description: Thêm tùy chọn dịch vào menu chuột phải của trình duyệt để dịch trang nhanh
  translation:
    title: Dịch thuật
    requestQueueConfig:
      title: Tốc độ dịch
      firstOnDescription: Điều chỉnh tốc độ xử lý yêu cầu dịch bằng
      lastOnDescription: thuật toán
      capacity:
        title: Số lượng yêu cầu burst tối đa
        description: Số lượng yêu cầu burst tạm thời được phép xác định số lượng yêu cầu tối đa có thể được xử lý đồng thời trong một khoảng thời gian ngắn
      rate:
        title: Số yêu cầu trung bình mỗi giây
        description: Số yêu cầu trung bình mỗi giây, nhưng cho phép cấu hình số lượng burst tối đa để gửi tạm thời các yêu cầu vượt quá
    batchQueueConfig:
      title: Dịch theo lô
      description: Cấu hình giới hạn ký tự và số đoạn văn tối đa cho dịch theo lô (chỉ có hiệu lực với dịch LLM)
      maxCharactersPerBatch:
        title: Số ký tự tối đa
        description: Số ký tự tối đa được phép cho mỗi yêu cầu lô để kiểm soát khối lượng nội dung của mỗi bản dịch
      maxItemsPerBatch:
        title: Số đoạn văn tối đa
        description: Số đoạn văn tối đa cho mỗi bản dịch lô để kiểm soát khối lượng nội dung của mỗi bản dịch
    autoTranslateWebsite:
      title: Tự động dịch theo trang web
      description: Luôn dịch trang web này
      urlPattern: Mẫu URL
      enterUrlPattern: Nhập mẫu URL
