      title: Kiểu hiển thị bản dịch
      description: Đặt bất kỳ kiểu nào bạn muốn để phân biệt kết quả dịch với văn bản gốc
      useCustomStyle: Sử dụng kiểu CSS tùy chỉnh
      useCustomStyleDescription: Hỗ trợ bất kỳ CSS nào, bao gồm phông chữ, hoạt ảnh và kiểu dành riêng cho ngôn ngữ
      presetStyle: Kiểu có sẵn
      cssEditor: Trình chỉnh sửa CSS
      preview: Xem trước
      stylePreviewLanguage: Ngôn ngữ
      stylePreviewDirection: Hướng
      stylePreviewTranslatedText: Văn bản đã dịch
      style:
        default: Không
        blur: Hiệu ứng mờ
        blockquote: Trích dẫn
        weakened: Làm mờ
        dashedLine: Đường nét đứt
        border: Viền
        textColor: Màu chữ
        background: Nền
      customCSS:
        editor:
          placeholder: |
            /* Ví dụ: Kiểu tùy chỉnh với màu sắc và nền */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Lưu
          savedButton: Đã lưu
          validation:
            validating: Đang xác thực...
            valid: CSS hợp lệ
            syntaxError: CSS có lỗi cú pháp
            tooLong: CSS quá dài
            saved: Tất cả thay đổi đã được lưu
    translationMode:
      title: Chế độ dịch
      description: 'Chọn cách hiển thị văn bản đã dịch: song ngữ hoặc chỉ bản dịch.'
      mode:
        bilingual: Song ngữ
        translationOnly: Chỉ bản dịch
    pageTranslationShortcut:
      title: Phím tắt dịch trang
      description: Tùy chỉnh phím tắt để dịch toàn bộ trang web
    preloadConfig:
      title: Phạm vi dịch trước
      description: Kiểm soát lượng nội dung bên dưới vùng nhìn được dịch trước để tiết kiệm chi phí API
      margin:
        title: Khoảng cách tải trước (pixel)
        description: Khoảng cách bên dưới vùng nhìn để bắt đầu dịch nội dung. Giá trị thấp hơn tiết kiệm chi phí API nhưng có thể gây chậm trễ khi cuộn.
      threshold:
        title: Ngưỡng hiển thị
        description: Tỷ lệ phần trăm hiển thị của phần tử cần thiết để kích hoạt dịch (0-1). Giá trị cao hơn sẽ trì hoãn dịch cho đến khi nhiều phần tử hơn được hiển thị.
    nodeTranslationHotkey:
      title: Phím tắt dịch khi di chuột
      description: Tùy chỉnh phím bổ trợ để dịch đoạn văn khi di chuột qua văn bản
    autoTranslateLanguages:
      title: Tự động dịch theo ngôn ngữ
      description: Tự động dịch nội dung trang khi phát hiện các ngôn ngữ cụ thể
      selectLanguages: Chọn ngôn ngữ
      enableLLMDetection: Sử dụng LLM để phát hiện ngôn ngữ
      enableLLMDetectionDescription: Cải thiện độ chính xác nhưng thêm độ trễ và chi phí API. Yêu cầu nhà cung cấp dịch LLM và các ngôn ngữ tự động dịch đã cấu hình.
