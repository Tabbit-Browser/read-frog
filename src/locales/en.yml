name: Tab Translation
extName: Tab Translation - Immersive Translate
extDescription: Tab Translation is a browser extension designed to help you learn languages deeply from any website.
contextMenu:
  translate: Translate
  showOriginal: Show Original
popup:
  autoLang: Auto
  sourceLang: Source
  targetLang: Target
  translate: Translate
  showOriginal: Show Original
  enabledSelectionToolbar: Enable selection toolbar
  alwaysTranslate: Always translate this site
  options: Options
  hover: Hover
  translateParagraph: to translate paragraph
options:
  sidebar:
    settings: Settings
  general:
    title: General
    translationConfig:
      title: Translation Config
      description: Only for translation within web pages, such as bilingual paragraph translation.
      translateRange:
        title: Translate Range
        range:
          main: Main Content
          all: All Content
    clearCache:
      title: Clear Cache
      description: Clear all translation cache in your browser
      clearing: Clearing...
      dialog:
        title: Clear Cache
        trigger: Clear Cache
        confirm: Confirm
        cancel: Cancel
        description: This operation will clear all translation cache. This action cannot be undone.
  overlayTools:
    title: Overlay Tools
    selectionToolbar:
      title: Selection Toolbar
    contextMenu:
      title: Context Menu
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: Enable Selection Toolbar
        description: Display the toolbar when selecting text on web pages for quick translation and reading
      closeMenu:
        disableForSite: Disable for this site
        disableGlobally: Disable globally
      disabledSites:
        title: Selection Toolbar Disabled Sites
        description: Configure websites where the selection toolbar should be disabled
        enterUrlPattern: Enter URL pattern
        urlPattern: URL Pattern
    contextMenu:
      translate:
        title: Enable Context Menu Translate
        description: Add a translate option to the browser right-click menu for quick page translation
  translation:
    title: Translation
    requestQueueConfig:
      title: Translation Rate
      firstOnDescription: Adjust the processing speed of translation requests using the
      lastOnDescription: algorithm
      capacity:
        title: Maximum Burst Request Count
        description: The allowed temporary burst request count determines the maximum number of requests that can be processed concurrently within a short period
      rate:
        title: Average Requests Per Second
        description: Average requests per second, but allows configuring a maximum burst count to temporarily send excess requests
    batchQueueConfig:
      title: Batch Translation
      description: Configure character limits and maximum paragraph count for batch translation (only effective for LLM translation)
      maxCharactersPerBatch:
        title: Maximum Characters
        description: Maximum number of characters allowed per batch request to control the content volume of each translation
      maxItemsPerBatch:
        title: Maximum Paragraph Count
        description: Maximum number of paragraphs for each batch translation to control the content volume of each translation
    autoTranslateWebsite:
      title: Auto Translate Based on Website
      description: Always translate this website
      urlPattern: URL Pattern
      enterUrlPattern: Enter URL Pattern
    translationStyle:
      title: Translation Display Style
      description: Set any style you want to distinguish translation results from original text
      useCustomStyle: Use Custom CSS Style
      useCustomStyleDescription: Supports any CSS, including fonts, animations, and language-specific styles
      presetStyle: Preset Style
      cssEditor: CSS Editor
      preview: Preview
      stylePreviewLanguage: Language
      stylePreviewDirection: Direction
      stylePreviewTranslatedText: Translated Text
      style:
        default: None
        blur: Blur Effect
        blockquote: Blockquote
        weakened: Weakened
        dashedLine: Dashed Line
        border: Border
        textColor: Text Color
        background: Background
      customCSS:
        editor:
          placeholder: |
            /* Example: Custom style with color and background */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Save
          savedButton: Saved
          validation:
            validating: Validating...
            valid: CSS is valid
            syntaxError: CSS has syntax errors
            tooLong: CSS is too long
            saved: All changes saved
    translationMode:
      title: Translation Mode
      description: 'Choose how the translated text is displayed: bilingual or translation only.'
      mode:
        bilingual: Bilingual
        translationOnly: Translation Only
    pageTranslationShortcut:
      title: Page Translation Shortcut
      description: Customize the shortcut key for translating entire web pages
    preloadConfig:
      title: Pre-translate Range
      description: Control how much content below the viewport gets pre-translated to save API costs
      margin:
        title: Preload Distance (pixels)
        description: How far below the viewport to start translating content. Lower values save API costs but may cause delays when scrolling.
      threshold:
        title: Visibility Threshold
        description: Percentage of element visibility required to trigger translation (0-1). Higher values delay translation until more of the element is visible.
    nodeTranslationHotkey:
      title: Hover Translation Shortcut
      description: Customize the modifier key for hovering over text to translate paragraphs
    autoTranslateLanguages:
      title: Auto Translate Based on Language
      description: Automatically translate page content when specific languages are detected
      selectLanguages: Select languages
      enableLLMDetection: Use LLM for language detection
      enableLLMDetectionDescription: Improves accuracy but adds latency and API costs. Requires LLM translate provider and configured auto-translate languages.
  config:
    sync:
      versionTooNew: The imported config version is newer, please upgrade Tab Translation to the latest version
      validationError: Config validation failed
  videoSubtitles:
    title: Video Subtitles
    description: Currently only supports YouTube video subtitles
    enable: Enable Video Subtitles
    enableDescription: When enabled, a translation button will appear in the YouTube player controls. Click it to start translating subtitles.
languageLevel: Your Source Lang Level
languageLevels:
  beginner: Beginner
  intermediate: Intermediate
  advanced: Advanced
translation:
  sameLanguage: Source and target languages must be different
  autoModeSameLanguage: Detected language '$1' is the same as target language
subtitles:
  state:
    idle: Ready
    fetching: Fetching captions
    fetchSuccess: Captions loaded
    fetchFailed: Failed to fetch captions
    processing: Translating captions (approx. 2 minutes)
    completed: Translation completed
    error: Error occurred
  errors:
    http429: 429 Too many requests to youtube subtitle API, please try again later
    http404: 404 Youtube captions not found
    http403: 403 Youtube caption access denied
    http500: 500 Youtube server error
    invalidResponse: Invalid Youtube subtitle response format
    networkError: Network error occurred when fetching captions
    fetchSubTimeout: Fetching youtube captions timed out
    buttonNotFound: Subtitle button not found
    noSubtitlesFound: No subtitles found
    videoNotFound: Video element not found
    controlsBarNotFound: Controls bar not found
