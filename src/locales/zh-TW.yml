name: Tab翻譯
extName: Tab翻譯 - 沉浸式翻譯
extDescription: Tab翻譯是一款瀏覽器插件，旨在幫助您從任何網站深入學習語言。
contextMenu:
  translate: 翻譯
  showOriginal: 顯示原文
popup:
  autoLang: 自動偵測
  sourceLang: 來源語言
  targetLang: 目標語言
  translate: 翻譯
  showOriginal: 顯示原文
  enabledSelectionToolbar: 啟用選擇工具列
  alwaysTranslate: 總是翻譯這個網站
  options: 選項
  hover: 滑鼠懸停
  translateParagraph: 來翻譯段落
options:
  sidebar:
    settings: 設定
  general:
    title: 通用
    translationConfig:
      title: 翻譯配置
      description: 僅用於網頁內的翻譯，如雙語段落翻譯。
      translateRange:
        title: 翻譯範圍
        range:
          main: 主要內容
          all: 所有內容
    clearCache:
      title: 清理快取
      description: 清理瀏覽器中的所有翻譯快取
      clearing: 清理中...
      dialog:
        title: 清理快取
        trigger: 清理快取
        confirm: 確認
        cancel: 取消
        description: 此操作將清理所有翻譯快取。此操作無法撤銷。
  overlayTools:
    title: 懸浮工具
    selectionToolbar:
      title: 選擇工具列
    contextMenu:
      title: 右鍵選單
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: 啟用選擇工具列
        description: 在網頁上選擇文字時顯示工具列，快速翻譯和閱讀
      closeMenu:
        disableForSite: 停用此網站
        disableGlobally: 全域停用
      disabledSites:
        title: 選擇工具列停用網站
        description: 設定需要停用選擇工具列的網站
        enterUrlPattern: 輸入網址模式
        urlPattern: URL 模式
    contextMenu:
      translate:
        title: 啟用右鍵翻譯
        description: 在瀏覽器右鍵選單中新增翻譯選項，快速翻譯頁面
  translation:
    title: 翻譯
    requestQueueConfig:
      title: 翻譯速率
      firstOnDescription: 調整翻譯請求的處理速度，使用
      lastOnDescription: 實現
      capacity:
        title: 最大突發請求數
        description: 允許的暫時突發請求數量，決定了在短時間內最多能同時處理多少個請求
      rate:
        title: 每秒平均請求數量
        description: 平均每秒的請求數量，但允許設定最大突發請求數來短暫發送超量請求
    batchQueueConfig:
      title: 批量翻譯
      description: 配置批量翻譯時的字元數限制和最大段落數量（僅對大語言模型翻譯有效）
      maxCharactersPerBatch:
        title: 最大字元數
        description: 每個批量請求允許的最大字元數，用於控制單次翻譯的內容量
      maxItemsPerBatch:
        title: 最大段落數
        description: 每個批量翻譯的最大段落數，用於控制單次翻譯的內容量
    autoTranslateWebsite:
      title: 基於網站自動翻譯
      description: 總是翻譯這個網站
      urlPattern: URL 模式
      enterUrlPattern: 輸入 URL 模式
    translationStyle:
      title: 翻譯顯示樣式
      description: 設置任何您想要的樣式以區分翻譯結果和原文
      useCustomStyle: 使用自訂 CSS 樣式
      useCustomStyleDescription: 支援任意 CSS，包括修改字體、動畫、多語言差異化樣式
      presetStyle: 預設樣式
      cssEditor: CSS 編輯器
      preview: 預覽
      stylePreviewLanguage: 語言
      stylePreviewDirection: 方向
      stylePreviewTranslatedText: 翻譯的文字
      style:
        default: 無
        blur: 模糊效果
        blockquote: 引用
        weakened: 弱化
        dashedLine: 虛線
        border: 邊框
        textColor: 文字顏色
        background: 背景
      customCSS:
        editor:
          placeholder: |
            /* 範例：自訂顏色和背景樣式 */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: 儲存
          savedButton: 已儲存
          validation:
            validating: 驗證中...
            valid: CSS 有效
            syntaxError: CSS 存在語法錯誤
            tooLong: CSS 過長
            saved: 所有變更已儲存
    translationMode:
      title: 翻譯模式
      description: 選擇翻譯文字的顯示方式：雙語對照或僅顯示翻譯
      mode:
        bilingual: 雙語對照
        translationOnly: 僅顯示翻譯
    pageTranslationShortcut:
      title: 網頁翻譯快捷鍵
      description: 自訂翻譯整個網頁的快捷鍵
    preloadConfig:
      title: 預翻譯範圍
      description: 控制視窗下方多少內容會被預先翻譯，以節省 API 費用
      margin:
        title: 預載距離（像素）
        description: 距離視窗多遠時開始翻譯內容。較小的值可節省 API 費用，但捲動時可能會有延遲。
      threshold:
        title: 可見度閾值
        description: 觸發翻譯所需的元素可見度百分比（0-1）。較高的值會延遲翻譯，直到更多元素可見。
    nodeTranslationHotkey:
      title: 懸停翻譯快捷鍵
      description: 自訂懸停在文字上翻譯段落的修飾鍵
    autoTranslateLanguages:
      title: 基於語言的自動翻譯
      description: 當檢測到特定語言時自動翻譯頁面內容
      selectLanguages: 選擇語言
      enableLLMDetection: 使用 LLM 偵測語言
      enableLLMDetectionDescription: 提高準確率，但會增加延遲和 API 費用。需要設定 LLM 翻譯提供商，並需配置自動翻譯語言。
  tts:
    title: 文字轉語音
  config:
    sync:
      versionTooNew: 匯入的設定版本較新，請升級Tab翻譯到最新版本
      validationError: 設定驗證失敗
  videoSubtitles:
    title: 影片字幕
    description: 目前僅支援 YouTube 影片字幕
    enable: 開啟影片字幕
    enableDescription: 啟用後，YouTube 播放器控制列會出現翻譯按鈕。點擊即可開始翻譯字幕。
languageLevel: 你的來源語言水平
languageLevels:
  beginner: 初級
  intermediate: 中級
  advanced: 高級
translation:
  sameLanguage: 源語言和目標語言必須不同
  autoModeSameLanguage: 檢測到的語言 '$1' 與目標語言相同
subtitles:
  state:
    idle: 就緒
    fetching: 字幕獲取中
    fetchSuccess: 字幕載入成功
    fetchFailed: 字幕獲取失敗
    processing: 字幕翻譯中（預計等待 2 分鐘）
    completed: 翻譯完成
    error: 發生錯誤
  errors:
    http429: 429 youtube 字幕介面請求次數過多，請稍後再試
    http404: 404 找不到 youtube 字幕
    http403: 403 youtube 字幕存取被拒絕
    http500: 500 youtube 伺服器錯誤
    invalidResponse: youtube 字幕回應格式無效
    networkError: 取得字幕時發生網路錯誤
    fetchSubTimeout: 取得 youtube 字幕逾時
    buttonNotFound: 字幕按鈕未找到
    noSubtitlesFound: 未找到字幕
    videoNotFound: 影片元素未找到
    controlsBarNotFound: 控制列未找到
