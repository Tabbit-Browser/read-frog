name: Tab 번역
extName: Tab 번역 - 몰입형 번역
extDescription: Tab 번역은 모든 웹사이트에서 언어를 깊이 있게 학습할 수 있도록 도와주는 브라우저 확장 프로그램입니다.
contextMenu:
  translate: 번역
  showOriginal: 원문 보기
popup:
  autoLang: 자동
  sourceLang: 원본
  targetLang: 대상
  translate: 번역
  showOriginal: 원문 보기
  enabledSelectionToolbar: 선택 툴바 활성화
  alwaysTranslate: 이 사이트 항상 번역
  options: 옵션
  hover: 마우스 오버
  translateParagraph: 단락 번역
options:
  sidebar:
    settings: 설정
  general:
    title: 일반
    translationConfig:
      title: 번역 설정
      description: 이중 언어 단락 번역과 같은 웹 페이지 내 번역에만 사용됩니다.
      translateRange:
        title: 번역 범위
        range:
          main: 주요 내용
          all: 모든 내용
    clearCache:
      title: 캐시 지우기
      description: 브라우저의 모든 번역 캐시를 지웁니다
      clearing: 지우는 중...
      dialog:
        title: 캐시 지우기
        trigger: 캐시 지우기
        confirm: 확인
        cancel: 취소
        description: 이 작업은 모든 번역 캐시를 지웁니다. 이 작업은 되돌릴 수 없습니다.
  overlayTools:
    title: 오버레이 도구
    selectionToolbar:
      title: 선택 툴바
    contextMenu:
      title: 컨텍스트 메뉴
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: 선택 툴바 활성화
        description: 웹 페이지에서 텍스트를 선택할 때 툴바를 표시하여 빠른 번역 및 읽기
      closeMenu:
        disableForSite: 이 사이트에서 비활성화
        disableGlobally: 전역 비활성화
      disabledSites:
        title: 선택 툴바 비활성화 사이트
        description: 선택 툴바를 비활성화할 웹사이트를 설정합니다
        enterUrlPattern: URL 패턴 입력
        urlPattern: URL 패턴
    contextMenu:
      translate:
        title: 우클릭 번역 활성화
        description: 브라우저 우클릭 메뉴에 번역 옵션을 추가하여 빠른 페이지 번역
  translation:
    title: 번역
    requestQueueConfig:
      title: 번역 속도
      firstOnDescription: 번역 요청 처리 속도 조정 및
      lastOnDescription: 구현
      capacity:
        title: 최대 버스트 요청 수
        description: 허용되는 임시 버스트 요청 수는 짧은 시간 내 동시 처리 가능한 최대 요청 수를 결정함
      rate:
        title: 초당 평균 요청 수
        description: 초당 평균 요청 수 (단, 최대 버스트 요청 수 설정을 통한 일시적 초과 요청 전송 허용)
    batchQueueConfig:
      title: 배치 번역
      description: 배치 번역 시 문자 수 제한 및 최대 단락 수 구성 (대규모 언어 모델 번역에서만 유효)
      maxCharactersPerBatch:
        title: 최대 문자 수
        description: 배치 요청당 허용되는 최대 문자 수로 각 번역의 콘텐츠 양을 제어합니다
      maxItemsPerBatch:
        title: 최대 단락 수
        description: 각 배치 번역의 최대 단락 수로 각 번역의 콘텐츠 양을 제어합니다
    autoTranslateWebsite:
      title: 웹사이트 기반 자동 번역
      description: 이 사이트를 항상 번역합니다
      urlPattern: URL 패턴
      enterUrlPattern: URL 패턴 입력
    translationStyle:
      title: 번역 표시 스타일
      description: 번역 결과와 원문을 구분하기 위해 원하는 스타일을 설정하세요
      useCustomStyle: 커스텀 CSS 스타일 사용
      useCustomStyleDescription: 모든 CSS 지원, 글꼴, 애니메이션, 언어별 스타일 등
      presetStyle: 프리셋 스타일
      cssEditor: CSS 편집기
      preview: 미리보기
      stylePreviewLanguage: 언어
      stylePreviewDirection: 방향
      stylePreviewTranslatedText: 번역된 텍스트
      style:
        default: 없음
        blur: 흐림 효과
        blockquote: 인용
        weakened: 약화
        dashedLine: 점선
        border: 테두리
        textColor: 텍스트 색상
        background: 배경
      customCSS:
        editor:
          placeholder: |
            /* 예제: 사용자 정의 색상 및 배경 스타일 */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: 저장
          savedButton: 저장됨
          validation:
            validating: 검증 중...
            valid: CSS가 유효합니다
            syntaxError: CSS에 구문 오류가 있습니다
            tooLong: CSS가 너무 깁니다
            saved: 모든 변경사항이 저장되었습니다
    translationMode:
      title: 번역 모드
      description: '번역된 텍스트 표시 방법 선택: 이중 언어 또는 번역만'
      mode:
        bilingual: 이중 언어
        translationOnly: 번역만
    pageTranslationShortcut:
      title: 페이지 번역 단축키
      description: 전체 웹페이지를 번역하는 단축키를 사용자 지정합니다
    preloadConfig:
      title: 사전 번역 범위
      description: API 비용을 절약하기 위해 뷰포트 아래 콘텐츠를 얼마나 사전 번역할지 제어합니다
      margin:
        title: 미리 로드 거리 (픽셀)
        description: 뷰포트에서 얼마나 떨어진 곳에서 콘텐츠 번역을 시작할지. 작은 값은 API 비용을 절약하지만 스크롤 시 지연이 발생할 수 있습니다.
      threshold:
        title: 가시성 임계값
        description: 번역을 트리거하는 데 필요한 요소 가시성 비율 (0-1). 높은 값은 요소가 더 많이 보일 때까지 번역을 지연시킵니다.
    nodeTranslationHotkey:
      title: 호버 번역 단축키
      description: 텍스트 위에 호버하여 단락을 번역할 때 사용할 수정 키를 사용자 지정합니다
    autoTranslateLanguages:
      title: 언어에 기반한 자동 번역
      description: 특정 언어가 감지되면 페이지 콘텐츠를 자동으로 번역합니다
      selectLanguages: 언어 선택
      enableLLMDetection: LLM을 사용한 언어 감지
      enableLLMDetectionDescription: 정확도가 향상되지만 지연 시간과 API 비용이 증가합니다. LLM 번역 제공업체와 자동 번역 언어 설정이 필요합니다.
  tts:
    title: 텍스트 음성 변환
  config:
    sync:
      versionTooNew: 가져온 설정 버전이 최신이므로 Tab 번역을 최신 버전으로 업그레이드해 주세요
      validationError: 설정 검증 실패
  videoSubtitles:
    title: 비디오 자막
    description: 현재 YouTube 비디오 자막만 지원
    enable: 비디오 자막 활성화
    enableDescription: 활성화하면 YouTube 플레이어 컨트롤 바에 번역 버튼이 나타납니다. 클릭하여 자막 번역을 시작하세요.
languageLevel: 원본 언어 수준
languageLevels:
  beginner: 초급
  intermediate: 중급
  advanced: 고급
translation:
  sameLanguage: 원본 언어와 대상 언어는 달라야 합니다
  autoModeSameLanguage: 감지된 언어 '$1'은(는) 대상 언어와 같습니다
subtitles:
  state:
    idle: 준비 완료
    fetching: 자막 가져오는 중
    fetchSuccess: 자막 로드 완료
    fetchFailed: 자막 가져오기 실패
    processing: 자막 번역 중 (약 2분 소요)
    completed: 번역 완료
    error: 오류 발생
  errors:
    http429: 429 유튜브 자막 인터페이스 요청이 너무 많습니다. 잠시 후 다시 시도해 주세요
    http404: 404 유튜브 자막을 찾을 수 없습니다
    http403: 403 유튜브 자막 접근이 거부되었습니다
    http500: 500 유튜브 서버 오류
    invalidResponse: 유튜브 자막 응답 형식이 잘못되었습니다
    networkError: 자막을 가져오는 도중 네트워크 오류가 발생했습니다
    fetchSubTimeout: 유튜브 자막 가져오기 시간이 초과되었습니다
    buttonNotFound: 자막 버튼을 찾을 수 없습니다
    noSubtitlesFound: 자막을 찾을 수 없습니다
    videoNotFound: 비디오 요소를 찾을 수 없습니다
    controlsBarNotFound: 컨트롤 바를 찾을 수 없습니다
