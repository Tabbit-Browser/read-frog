name: Tabbit Translation
extName: Tabbit Translation - Иммерсивный переводчик
extDescription: Tabbit Translation — расширение браузера, которое поможет вам глубоко изучать языки на любом веб-сайте.
contextMenu:
  translate: Перевести
  showOriginal: Показать оригинал
popup:
  autoLang: Авто
  sourceLang: Исходный
  targetLang: Целевой
  translate: Перевести
  showOriginal: Показать оригинал
  enabledSelectionToolbar: Включить панель выделения
  alwaysTranslate: Всегда переводить этот сайт
  options: Настройки
  hover: Наведение
  translateParagraph: для перевода абзаца
options:
  sidebar:
    settings: Настройки
  general:
    title: Общие
    translationConfig:
      title: Настройки перевода
      description: Только для перевода на веб-страницах, например, двуязычный перевод абзацев.
      translateRange:
        title: Диапазон перевода
        range:
          main: Основной контент
          all: Весь контент
    clearCache:
      title: Очистить кэш
      description: Очистить весь кэш перевода в вашем браузере
      clearing: Очистка...
      dialog:
        title: Очистить кэш
        trigger: Очистить кэш
        confirm: Подтвердить
        cancel: Отмена
        description: Эта операция очистит весь кэш перевода. Это действие нельзя отменить.
  overlayTools:
    title: Инструменты наложения
    selectionToolbar:
      title: Панель выделения
    contextMenu:
      title: Контекстное меню
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: Включить панель выделения
        description: Отображать панель при выделении текста на веб-страницах для быстрого перевода и чтения
      closeMenu:
        disableForSite: Отключить для этого сайта
        disableGlobally: Отключить глобально
      disabledSites:
        title: Сайты с отключённой панелью выделения
        description: Настройте веб-сайты, где панель выделения должна быть отключена
        enterUrlPattern: Введите URL-шаблон
        urlPattern: URL-шаблон
    contextMenu:
      translate:
        title: Включить перевод в контекстном меню
        description: Добавить опцию перевода в контекстное меню браузера для быстрого перевода страницы
  translation:
    title: Перевод
    requestQueueConfig:
      title: Скорость перевода
      firstOnDescription: Настройте скорость обработки запросов перевода с помощью
      lastOnDescription: алгоритма
      capacity:
        title: Максимальное количество пакетных запросов
        description: Допустимое временное количество пакетных запросов определяет максимальное количество запросов, которые могут обрабатываться одновременно в течение короткого периода
      rate:
        title: Среднее количество запросов в секунду
        description: Среднее количество запросов в секунду, но позволяет настроить максимальное количество пакетов для временной отправки избыточных запросов
    batchQueueConfig:
      title: Пакетный перевод
      description: Настройте лимиты символов и максимальное количество абзацев для пакетного перевода (действует только для LLM-перевода)
      maxCharactersPerBatch:
        title: Максимум символов
        description: Максимальное количество символов, разрешённое на один пакетный запрос, для контроля объёма содержимого каждого перевода
      maxItemsPerBatch:
        title: Максимум абзацев
        description: Максимальное количество абзацев для каждого пакетного перевода для контроля объёма содержимого каждого перевода
    autoTranslateWebsite:
      title: Автоперевод по веб-сайту
      description: Всегда переводить этот веб-сайт
      urlPattern: URL-шаблон
      enterUrlPattern: Введите URL-шаблон
    translationStyle:
      title: Стиль отображения перевода
      description: Установите любой стиль для отличия результатов перевода от оригинального текста
      useCustomStyle: Использовать пользовательский CSS-стиль
      useCustomStyleDescription: Поддерживает любой CSS, включая шрифты, анимации и стили для конкретных языков
      presetStyle: Предустановленный стиль
      cssEditor: CSS-редактор
      preview: Предпросмотр
      stylePreviewLanguage: Язык
      stylePreviewDirection: Направление
      stylePreviewTranslatedText: Переведённый текст
      style:
        default: Нет
        blur: Эффект размытия
        blockquote: Цитата
        weakened: Ослабленный
        dashedLine: Пунктирная линия
        border: Граница
        textColor: Цвет текста
        background: Фон
      customCSS:
        editor:
          placeholder: |
            /* Пример: Пользовательский стиль с цветом и фоном */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Сохранить
          savedButton: Сохранено
          validation:
            validating: Проверка...
            valid: CSS корректен
            syntaxError: CSS содержит синтаксические ошибки
            tooLong: CSS слишком длинный
            saved: Все изменения сохранены
    translationMode:
      title: Режим перевода
      description: 'Выберите способ отображения переведённого текста: двуязычный или только перевод.'
      mode:
        bilingual: Двуязычный
        translationOnly: Только перевод
    pageTranslationShortcut:
      title: Горячая клавиша перевода страницы
      description: Настройте горячую клавишу для перевода всей веб-страницы
    preloadConfig:
      title: Диапазон предварительного перевода
      description: Управляйте количеством контента ниже области просмотра, который будет предварительно переведён для экономии затрат на API
      margin:
        title: Расстояние предзагрузки (в пикселях)
        description: Насколько ниже области просмотра начинать перевод контента. Меньшие значения экономят затраты на API, но могут вызвать задержки при прокрутке.
      threshold:
        title: Порог видимости
        description: Процент видимости элемента, необходимый для запуска перевода (0-1). Более высокие значения откладывают перевод до тех пор, пока больше элемента не станет видимым.
    nodeTranslationHotkey:
      title: Горячая клавиша перевода при наведении
      description: Настройте клавишу-модификатор для перевода абзацев при наведении на текст
    autoTranslateLanguages:
      title: Автоперевод по языку
      description: Автоматически переводить содержимое страницы при обнаружении определённых языков
      selectLanguages: Выберите языки
      enableLLMDetection: Использовать LLM для определения языка
      enableLLMDetectionDescription: Повышает точность, но добавляет задержку и затраты на API. Требуется LLM-провайдер перевода и настроенные языки автоперевода.
  tts:
    title: Синтез речи
  config:
    sync:
      versionTooNew: Версия импортированной конфигурации новее, пожалуйста, обновите Tabbit Translation до последней версии
      validationError: Ошибка валидации конфигурации
  videoSubtitles:
    title: Видео субтитры
    description: В настоящее время поддерживаются только субтитры YouTube
    enable: Включить видео субтитры
    enableDescription: При включении в панели управления YouTube появится кнопка перевода. Нажмите её, чтобы начать перевод субтитров.
languageLevel: Ваш уровень исходного языка
languageLevels:
  beginner: Начинающий
  intermediate: Средний
  advanced: Продвинутый
translation:
  sameLanguage: Исходный и целевой языки должны различаться
  autoModeSameLanguage: Обнаруженный язык '$1' совпадает с целевым языком
shortcutKeySelector:
  placeholder: Нажмите клавиши для записи сочетания клавиш
subtitles:
  state:
    idle: Готово
    fetching: Получение субтитров
    fetchSuccess: Субтитры загружены
    fetchFailed: Не удалось получить субтитры
    processing: Перевод субтитров (примерно 2 минуты)
    completed: Перевод завершён
    error: Произошла ошибка
  errors:
    http429: 429 Слишком много запросов к API YouTube субтитров, пожалуйста, попробуйте снова позже
    http404: 404 Субтитры YouTube не найдены
    http403: 403 Доступ к субтитрам YouTube запрещён
    http500: 500 Произошла ошибка сервера YouTube
    invalidResponse: Неверный формат ответа субтитров YouTube
    networkError: Произошла сетевая ошибка при получении субтитров
    fetchSubTimeout: Получение субтитров YouTube завершилось с ошибкой
    buttonNotFound: Кнопка субтитров не найдена
    noSubtitlesFound: Субтитры не найдены
    videoNotFound: Видео элемент не найден
    controlsBarNotFound: Панель управления не найдена
