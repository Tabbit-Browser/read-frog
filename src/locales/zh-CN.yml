name: Tabbit翻译
extName: Tabbit翻译 - 沉浸式翻译
extDescription: Tabbit翻译是一款浏览器插件，旨在帮助您从任何网站深入学习语言。
contextMenu:
  translate: 翻译
  showOriginal: 显示原文
popup:
  autoLang: 自动检测
  sourceLang: 来源语言
  targetLang: 目标语言
  translate: 翻译
  showOriginal: 显示原文
  enabledSelectionToolbar: 启用选择工具栏
  alwaysTranslate: 总是翻译这个网站
  options: 选项
  hover: 鼠标悬停
  translateParagraph: 来翻译段落
options:
  sidebar:
    settings: 设置
  general:
    title: 通用
    translationConfig:
      title: 翻译配置
      description: 仅用于网页内的翻译，如双语段落翻译。
      translateRange:
        title: 翻译范围
        range:
          main: 主要内容
          all: 所有内容
    clearCache:
      title: 清理缓存
      description: 清理浏览器中的所有翻译缓存
      clearing: 清理中...
      dialog:
        title: 清理缓存
        trigger: 清理缓存
        confirm: 确认
        cancel: 取消
        description: 此操作将清理所有翻译缓存。此操作无法撤销。
  overlayTools:
    title: 悬浮工具
    selectionToolbar:
      title: 选择工具栏
    contextMenu:
      title: 右键菜单
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: 启用选择工具栏
        description: 在网页上选择文本时显示工具栏，快速翻译和阅读
      closeMenu:
        disableForSite: 禁用此网站
        disableGlobally: 全局禁用
      disabledSites:
        title: 选择工具栏禁用网站
        description: 配置需要禁用选择工具栏的网站
        enterUrlPattern: 输入网址模式
        urlPattern: 网址模式
    contextMenu:
      translate:
        title: 启用右键翻译
        description: 在浏览器右键菜单中添加翻译选项，快速翻译页面
  translation:
    title: 翻译
    requestQueueConfig:
      title: 翻译速率
      firstOnDescription: 调整翻译请求的处理速度，使用
      lastOnDescription: 实现
      capacity:
        title: 最大突发请求数
        description: 允许的暂时突发请求数量，决定了在短时间内最多能同时处理多少个请求
      rate:
        title: 每秒平均请求数量
        description: 平均每秒的请求数量，不过允许配置最大突发请求数来短暂发送超量请求。
    batchQueueConfig:
      title: 批量翻译
      description: 配置批量翻译时的字符数限制和最大段落数量（仅对大语言模型翻译有效）
      maxCharactersPerBatch:
        title: 最大字符数
        description: 每个批量请求允许的最大字符数，用于控制单次翻译的内容量
      maxItemsPerBatch:
        title: 最大段落数
        description: 每个批量翻译的最大段落数，用于控制单次翻译的内容量
    autoTranslateWebsite:
      title: 基于网站自动翻译
      description: 总是翻译这个网站
      urlPattern: URL 模式
      enterUrlPattern: 输入 URL 模式
    translationStyle:
      title: 翻译显示样式
      description: 设置任何你想要的样式以区分翻译结果和原文
      useCustomStyle: 使用自定义 CSS 样式
      useCustomStyleDescription: 支持任意 CSS，包括修改字体、动画、多语言差异化样式
      presetStyle: 预设样式
      cssEditor: CSS 编辑器
      preview: 预览
      stylePreviewLanguage: 语言
      stylePreviewDirection: 方向
      stylePreviewTranslatedText: 翻译的文本
      style:
        default: 无
        blur: 模糊效果
        blockquote: 引用
        weakened: 弱化
        dashedLine: 虚线
        border: 边框
        textColor: 文字颜色
        background: 背景
      customCSS:
        editor:
          placeholder: |
            /* 示例：自定义颜色和背景样式 */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: 保存
          savedButton: 已保存
          validation:
            validating: 验证中...
            valid: CSS 有效
            syntaxError: CSS 存在语法错误
            tooLong: CSS 过长
            saved: 所有更改已保存
    translationMode:
      title: 翻译模式
      description: 选择翻译文本的显示方式：双语对照或仅显示翻译
      mode:
        bilingual: 双语对照
        translationOnly: 仅显示翻译
    pageTranslationShortcut:
      title: 网页翻译快捷键
      description: 自定义翻译整个网页的快捷键
    preloadConfig:
      title: 预翻译范围
      description: 控制视口下方多少内容会被预先翻译，以节省 API 费用
      margin:
        title: 预加载距离（像素）
        description: 距离视口多远时开始翻译内容。较小的值可节省 API 费用，但滚动时可能会有延迟。
      threshold:
        title: 可见度阈值
        description: 触发翻译所需的元素可见度百分比（0-1）。较高的值会延迟翻译，直到更多元素可见。
    nodeTranslationHotkey:
      title: 悬停翻译快捷键
      description: 自定义悬停在文本上翻译段落的修饰键
    autoTranslateLanguages:
      title: 基于语言的自动翻译
      description: 当检测到指定语言时自动翻译页面内容
      selectLanguages: 选择语言
      enableLLMDetection: 使用 LLM 检测语言
      enableLLMDetectionDescription: 提高准确率，但会增加延迟和 API 费用。需要配置 LLM 翻译提供商，并需配置自动翻译语言。
  tts:
    title: 文本转语音
  config:
    sync:
      versionTooNew: 导入的配置版本较新，请升级Tabbit翻译到最新版本
      validationError: 配置验证失败
  videoSubtitles:
    title: 视频字幕
    description: 当前仅支持 YouTube 视频字幕
    enable: 开启视频字幕
    enableDescription: 启用后，YouTube 播放器控制栏会出现翻译按钮。点击即可开始翻译字幕。
languageLevel: 你的来源语言水平
languageLevels:
  beginner: 初级
  intermediate: 中级
  advanced: 高级
translation:
  sameLanguage: 源语言和目标语言必须不同
  autoModeSameLanguage: 检测到的语言 '$1' 与目标语言相同
shortcutKeySelector:
  placeholder: 按下按键以录制快捷键
subtitles:
  state:
    idle: 就绪
    fetching: 字幕获取中
    fetchSuccess: 字幕加载成功
    fetchFailed: 字幕获取失败
    processing: 字幕翻译中（预计等待 2 分钟）
    completed: 翻译完成
    error: 发生错误
  errors:
    http429: 429 youtube 字幕接口请求次数过多，请稍后再试
    http404: 404 未找到 youtube 字幕
    http403: 403 youtube 字幕访问被拒绝
    http500: 500 youtube 服务器错误
    invalidResponse: youtube 字幕响应格式无效
    networkError: 获取字幕时发生网络错误
    fetchSubTimeout: 获取 youtube 字幕超时
    buttonNotFound: 字幕按钮未找到
    noSubtitlesFound: 未找到字幕
    videoNotFound: 视频元素未找到
    controlsBarNotFound: 控制栏未找到
