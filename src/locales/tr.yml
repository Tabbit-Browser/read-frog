name: Tab Çevirisi
extName: Tab Çevirisi - Sürükleyici Çeviri
extDescription: Tab Çevirisi, herhangi bir web sitesinden dilleri derinlemesine öğrenmenize yardımcı olmak için tasarlanmış bir tarayıcı uzantısıdır.
contextMenu:
  translate: Çevir
  showOriginal: Orijinali Göster
popup:
  autoLang: Otomatik
  sourceLang: Kaynak
  targetLang: Hedef
  translate: Çevir
  showOriginal: Orijinali Göster
  enabledSelectionToolbar: Seçim araç çubuğunu etkinleştir
  alwaysTranslate: Bu siteyi her zaman çevir
  options: Seçenekler
  hover: Üzerine Gel
  translateParagraph: paragrafı çevirmek için
options:
  sidebar:
    settings: Ayarlar
  general:
    title: Genel
    translationConfig:
      title: Çeviri Yapılandırması
      description: Yalnızca web sayfalarındaki çeviri için, örneğin iki dilli paragraf çevirisi.
      translateRange:
        title: Çeviri Kapsamı
        range:
          main: Ana İçerik
          all: Tüm İçerik
    clearCache:
      title: Önbelleği Temizle
      description: Tarayıcınızdaki tüm çeviri önbelleğini temizleyin
      clearing: Temizleniyor...
      dialog:
        title: Önbelleği Temizle
        trigger: Önbelleği Temizle
        confirm: Onayla
        cancel: İptal
        description: Bu işlem tüm çeviri önbelleğini temizleyecektir. Bu işlem geri alınamaz.
  overlayTools:
    title: Kaplama Araçları
    selectionToolbar:
      title: Seçim Araç Çubuğu
    contextMenu:
      title: Bağlam Menüsü
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: Seçim Araç Çubuğunu Etkinleştir
        description: Hızlı çeviri ve okuma için web sayfalarında metin seçerken araç çubuğunu görüntüle
      closeMenu:
        disableForSite: Bu site için devre dışı bırak
        disableGlobally: Genel olarak devre dışı bırak
      disabledSites:
        title: Seçim Araç Çubuğu Devre Dışı Siteler
        description: Seçim araç çubuğunun devre dışı bırakılması gereken web sitelerini yapılandırın
        enterUrlPattern: URL kalıbı girin
        urlPattern: URL Kalıbı
    contextMenu:
      translate:
        title: Bağlam Menüsü Çevirisini Etkinleştir
        description: Hızlı sayfa çevirisi için tarayıcı sağ tıklama menüsüne çeviri seçeneği ekle
  translation:
    title: Çeviri
    requestQueueConfig:
      title: Çeviri Hızı
      firstOnDescription: Çeviri isteklerinin işleme hızını
      lastOnDescription: algoritmasıyla ayarlayın
      capacity:
        title: Maksimum Ani İstek Sayısı
        description: İzin verilen geçici ani istek sayısı, kısa bir süre içinde eşzamanlı olarak işlenebilecek maksimum istek sayısını belirler
      rate:
        title: Saniyedeki Ortalama İstek
        description: Saniyedeki ortalama istek, ancak geçici olarak fazla istek göndermek için maksimum ani sayısını yapılandırmaya izin verir
    batchQueueConfig:
      title: Toplu Çeviri
      description: Toplu çeviri için karakter limitleri ve maksimum paragraf sayısını yapılandırın (yalnızca LLM çevirisi için geçerlidir)
      maxCharactersPerBatch:
        title: Maksimum Karakter
        description: Her çevirinin içerik hacmini kontrol etmek için toplu istek başına izin verilen maksimum karakter sayısı
      maxItemsPerBatch:
        title: Maksimum Paragraf Sayısı
        description: Her çevirinin içerik hacmini kontrol etmek için her toplu çeviri için maksimum paragraf sayısı
    autoTranslateWebsite:
      title: Web Sitesine Göre Otomatik Çevir
      description: Bu web sitesini her zaman çevir
      urlPattern: URL Kalıbı
      enterUrlPattern: URL Kalıbı Girin
    translationStyle:
      title: Çeviri Görüntüleme Stili
      description: Çeviri sonuçlarını orijinal metinden ayırt etmek için istediğiniz herhangi bir stili ayarlayın
      useCustomStyle: Özel CSS Stili Kullan
      useCustomStyleDescription: Yazı tipleri, animasyonlar ve dile özgü stiller dahil herhangi bir CSS'yi destekler
      presetStyle: Hazır Stil
      cssEditor: CSS Editörü
      preview: Önizleme
      stylePreviewLanguage: Dil
      stylePreviewDirection: Yön
      stylePreviewTranslatedText: Çevrilmiş Metin
      style:
        default: Yok
        blur: Bulanıklık Efekti
        blockquote: Alıntı
        weakened: Zayıflatılmış
        dashedLine: Kesikli Çizgi
        border: Kenarlık
        textColor: Metin Rengi
        background: Arka Plan
      customCSS:
        editor:
          placeholder: |
            /* Örnek: Renk ve arka planlı özel stil */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: Kaydet
          savedButton: Kaydedildi
          validation:
            validating: Doğrulanıyor...
            valid: CSS geçerli
            syntaxError: CSS sözdizimi hataları içeriyor
            tooLong: CSS çok uzun
            saved: Tüm değişiklikler kaydedildi
    translationMode:
      title: Çeviri Modu
      description: 'Çevrilmiş metnin nasıl görüntüleneceğini seçin: iki dilli veya yalnızca çeviri.'
      mode:
        bilingual: İki Dilli
        translationOnly: Yalnızca Çeviri
    pageTranslationShortcut:
      title: Sayfa Çeviri Kısayolu
      description: Tüm web sayfalarını çevirmek için kısayol tuşunu özelleştirin
    preloadConfig:
      title: Ön Çeviri Aralığı
      description: API maliyetlerinden tasarruf etmek için görünüm alanının altındaki ne kadar içeriğin önceden çevrileceğini kontrol edin
      margin:
        title: Ön Yükleme Mesafesi (piksel)
        description: İçeriği çevirmeye başlamak için görünüm alanının ne kadar altı. Daha düşük değerler API maliyetlerinden tasarruf sağlar ancak kaydırma sırasında gecikmelere neden olabilir.
      threshold:
        title: Görünürlük Eşiği
        description: Çeviriyi tetiklemek için gereken öğe görünürlük yüzdesi (0-1). Daha yüksek değerler, öğenin daha fazlası görünür olana kadar çeviriyi geciktirir.
    nodeTranslationHotkey:
      title: Üzerine Gelme Çeviri Kısayolu
      description: Paragrafları çevirmek için metnin üzerine gelirken değiştirici tuşu özelleştirin
    autoTranslateLanguages:
      title: Dile Göre Otomatik Çevir
      description: Belirli diller algılandığında sayfa içeriğini otomatik olarak çevir
      selectLanguages: Dilleri seçin
      enableLLMDetection: Dil algılama için LLM kullan
      enableLLMDetectionDescription: Doğruluğu artırır ancak gecikme ve API maliyetleri ekler. LLM çeviri sağlayıcısı ve yapılandırılmış otomatik çeviri dilleri gerektirir.
  tts:
    title: Metinden Konuşmaya
  config:
    sync:
      versionTooNew: İçe aktarılan yapılandırma sürümü daha yeni, lütfen Tab Çevirisi'ni en son sürüme yükseltin
      validationError: Yapılandırma doğrulaması başarısız
  videoSubtitles:
    title: Video Altyazıları
    description: Şu anda yalnızca YouTube video altyazılarını desteklemektedir
    enable: Video Altyazılarını Etkinleştir
    enableDescription: Etkinleştirildiğinde, YouTube oynatıcı kontrollerinde bir çeviri düğmesi görünecektir. Altyazıları çevirmeye başlamak için tıklayın.
languageLevel: Kaynak Dil Seviyeniz
languageLevels:
  beginner: Başlangıç
  intermediate: Orta
  advanced: İleri
translation:
  sameLanguage: Kaynak ve hedef diller farklı olmalıdır
  autoModeSameLanguage: Algılanan dil '$1' hedef dille aynı
subtitles:
  state:
    idle: Hazır
    fetching: Altyazılar alınıyor
    fetchSuccess: Altyazılar yüklendi
    fetchFailed: Altyazılar alınamadı
    processing: Altyazılar çevriliyor (yaklaşık 2 dakika)
    completed: Çeviri tamamlandı
    error: Bir hata oluştu
  errors:
    http429: 429 YouTube altyazı API'sine çok fazla istek gönderildi. Lütfen biraz bekleyip tekrar deneyin.
    http404: 404 YouTube altyazı bulunamadı.
    http403: 403 YouTube altyazı erişimi reddedildi.
    http500: 500 YouTube sunucu hatası oluştu.
    invalidResponse: YouTube altyazı yanıt biçimi geçersiz
    networkError: YouTube altyazılar alınırken ağ hatası oluştu.
    fetchSubTimeout: YouTube altyazılar alınırken zaman aşımı oluştu.
    buttonNotFound: Altyazı butonu bulunamadı
    noSubtitlesFound: Altyazı bulunamadı
    videoNotFound: Video öğesi bulunamadı
    controlsBarNotFound: Kontrol çubuğu bulunamadı
