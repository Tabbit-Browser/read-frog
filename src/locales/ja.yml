name: Tab翻訳
extName: Tab翻訳 - インビジブル翻訳
extDescription: Tab翻訳は、あらゆるウェブサイトから言語を深く学ぶために設計されたブラウザ拡張機能です。
contextMenu:
  translate: 翻訳
  showOriginal: 原文を表示
popup:
  autoLang: 自動検出
  sourceLang: ソース言語
  targetLang: 翻訳言語
  translate: 翻訳
  showOriginal: 原文を表示
  enabledSelectionToolbar: 選択ツールバーを有効化
  alwaysTranslate: このサイトを常に翻訳する
  options: オプション
  hover: ホバー
  translateParagraph: 段落を翻訳
options:
  sidebar:
    settings: 設定
  general:
    title: 一般
    translationConfig:
      title: 翻訳設定
      description: ウェブページ内の翻訳にのみ使用されます（バイリンガル段落翻訳など）。
      translateRange:
        title: 翻訳範囲
        range:
          main: メインコンテンツ
          all: すべてのコンテンツ
    clearCache:
      title: キャッシュクリア
      description: ブラウザのすべての翻訳キャッシュをクリアします
      clearing: クリア中...
      dialog:
        title: キャッシュクリア
        trigger: キャッシュクリア
        confirm: 確認
        cancel: キャンセル
        description: この操作により、すべての翻訳キャッシュがクリアされます。この操作は元に戻せません。
  overlayTools:
    title: オーバーレイツール
    selectionToolbar:
      title: 選択ツールバー
    contextMenu:
      title: コンテキストメニュー
  floatingButtonAndToolbar:
    selectionToolbar:
      globalToggle:
        title: 選択ツールバーを有効化
        description: ウェブページでテキストを選択したときにツールバーを表示し、素早く翻訳と読解
      closeMenu:
        disableForSite: このサイトで無効化
        disableGlobally: グローバルで無効化
      disabledSites:
        title: 選択ツールバー無効化サイト
        description: 選択ツールバーを無効化するウェブサイトを設定します
        enterUrlPattern: URL パターンを入力
        urlPattern: URL パターン
    contextMenu:
      translate:
        title: 右クリック翻訳を有効化
        description: ブラウザの右クリックメニューに翻訳オプションを追加し、ページを素早く翻訳
  translation:
    title: 翻訳
    requestQueueConfig:
      title: 翻訳速度
      firstOnDescription: 翻訳リクエストの処理速度を調整し、
      lastOnDescription: を利用して実装する
      capacity:
        title: 最大バーストリクエスト数
        description: 許容される一時的バーストリクエスト数は、短期間内に同時処理可能な最大リクエスト数を決定する
      rate:
        title: 秒間平均リクエスト数
        description: 平均秒間リクエスト数（ただし、最大バーストリクエスト数を設定し一時的な超過リクエスト送信を許可）
    batchQueueConfig:
      title: バッチ翻訳
      description: バッチ翻訳時の文字数制限と最大段落数を設定（大規模言語モデル翻訳でのみ有効）
      maxCharactersPerBatch:
        title: 最大文字数
        description: バッチリクエストあたりの最大文字数で、各翻訳のコンテンツ量を制御します
      maxItemsPerBatch:
        title: 最大段落数
        description: 各バッチ翻訳の最大段落数、各翻訳のコンテンツ量を制御します
    autoTranslateWebsite:
      title: ウェブサイトに基づく自動翻訳
      description: このサイトを常に翻訳する
      urlPattern: URL パターン
      enterUrlPattern: URL パターンを入力
    translationStyle:
      title: 翻訳表示スタイル
      description: 翻訳結果と原文を区別するために好みのスタイルを設定
      useCustomStyle: カスタム CSS スタイルを使用
      useCustomStyleDescription: 任意の CSS に対応、フォント、アニメーション、言語別スタイルなど
      presetStyle: プリセットスタイル
      cssEditor: CSS エディター
      preview: プレビュー
      stylePreviewLanguage: 言語
      stylePreviewDirection: 方向
      stylePreviewTranslatedText: 翻訳済みテキスト
      style:
        default: なし
        blur: ぼかし効果
        blockquote: 引用
        weakened: 弱化
        dashedLine: 破線
        border: 枠線
        textColor: テキストカラー
        background: 背景
      customCSS:
        editor:
          placeholder: |
            /* 例：カスタムカラーと背景のスタイル */
            [data-tab-translation-custom-translation-style='custom'] {
              color: #414535;
              background-color: light-dark(#F2E3BC, #C19875);
              padding: 2px 4px;
              border-radius: 4px;
            }
          saveButton: 保存
          savedButton: 保存済み
          validation:
            validating: 検証中...
            valid: CSS は有効です
            syntaxError: CSS に構文エラーがあります
            tooLong: CSS が長すぎます
            saved: すべての変更が保存されました
    translationMode:
      title: 翻訳モード
      description: 翻訳テキストの表示方法を選択：バイリンガルまたは翻訳のみ
      mode:
        bilingual: バイリンガル
        translationOnly: 翻訳のみ
    pageTranslationShortcut:
      title: ページ翻訳ショートカットキー
      description: ウェブページ全体を翻訳するショートカットキーをカスタマイズします
    preloadConfig:
      title: 事前翻訳範囲
      description: ビューポート下のコンテンツをどれだけ事前翻訳するかを制御し、 API コストを節約します
      margin:
        title: プリロード距離（ピクセル）
        description: ビューポートからどれくらい離れた位置でコンテンツの翻訳を開始するか。小さい値は API コストを節約しますが、スクロール時に遅延が発生する可能性があります。
      threshold:
        title: 可視性しきい値
        description: 翻訳をトリガーするために必要な要素の可視性の割合（0-1）。高い値は、要素がより多く表示されるまで翻訳を遅らせます。
    nodeTranslationHotkey:
      title: ホバー翻訳ショートカットキー
      description: テキストにホバーして段落を翻訳する際の修飾キーをカスタマイズします
    autoTranslateLanguages:
      title: 言語に基づく自動翻訳
      description: 特定の言語が検出された場合にページコンテンツを自動翻訳します
      selectLanguages: 言語を選択
      enableLLMDetection: LLM を使用した言語検出
      enableLLMDetectionDescription: 精度が向上しますが、遅延と API コストが増加します。 LLM 翻訳プロバイダーと自動翻訳言語の設定が必要です。
  tts:
    title: 音声読み上げ
  config:
    sync:
      versionTooNew: インポートされた設定のバージョンが新しいため、Tab翻訳を最新バージョンにアップグレードしてください
      validationError: 設定の検証に失敗しました
  videoSubtitles:
    title: 動画字幕
    description: 現在 YouTube 動画字幕のみ対応
    enable: 動画字幕を有効にする
    enableDescription: 有効にすると、 YouTube プレーヤーのコントロールバーに翻訳ボタンが表示されます。クリックして字幕の翻訳を開始します。
languageLevel: ソース言語のレベル
languageLevels:
  beginner: 初級
  intermediate: 中級
  advanced: 上級
translation:
  sameLanguage: ソース言語とターゲット言語は異なる必要があります
  autoModeSameLanguage: 検出された言語 '$1' はターゲット言語と同じです
shortcutKeySelector:
  placeholder: キーを押してショートカットを記録
subtitles:
  state:
    idle: 準備完了
    fetching: 字幕を取得中
    fetchSuccess: 字幕読み込み完了
    fetchFailed: 字幕取得失敗
    processing: 字幕翻訳中（約 2 分）
    completed: 翻訳完了
    error: エラーが発生しました
  errors:
    http429: 429 YouTube 字幕 API へのリクエストが多すぎます。しばらくしてから再試行してください
    http404: 404 YouTube の字幕が見つかりません
    http403: 403 YouTube 字幕へのアクセスが拒否されました
    http500: 500 YouTube サーバーエラー
    invalidResponse: YouTube 字幕のレスポンス形式が無効です
    networkError: 字幕取得時にネットワークエラーが発生しました
    fetchSubTimeout: YouTube 字幕の取得がタイムアウトしました
    buttonNotFound: 字幕ボタンが見つかりません
    noSubtitlesFound: 字幕が見つかりません
    videoNotFound: 動画要素が見つかりません
    controlsBarNotFound: コントロールバーが見つかりません
